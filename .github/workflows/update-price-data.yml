name: Update price data daily

on:
  schedule:
    - cron: '35 3 * * *'  # 11:35 HKT daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Build latest price-data.json
        run: python .github/scripts/update_price_data.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add price-data.json
          git diff --staged --quiet || git commit -m "Auto update price-data.json"
          git push
